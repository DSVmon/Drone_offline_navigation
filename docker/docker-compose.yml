services:
  drone_sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../src:/drone_ws/src:rw
    network_mode: host
    privileged: true
    # Hardware acceleration (NVIDIA example)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    command: ros2 launch drone_simulation simulation_launch.py
